<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jirando</title>
  <script>
    (function redirectByLanguage() {
      const lang = (navigator.language || navigator.userLanguage || "en").toLowerCase();
      const target = lang.startsWith("pt") ? "pt-br.html" : lang.startsWith("es") ? "es-es.html" : "en-us.html";
      window.location.replace(target);
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=en-us.html">
  </noscript>
</head>
<body>
  <p>If you are not redirected automatically, <a href="en-us.html">open the English version</a>.</p>
</body>
</html>
