  <section class="contact">
    <h2>Contact Us</h2>
    <form action="mailto:info@jirando.com" method="post" enctype="text/plain">
      <label>Name:</label>
      <input type="text" name="name" required>
      <label>Email:</label>
      <input type="email" name="email" required>
      <label>Subject:</label>
      <input type="text" name="subject">
      <label>Message:</label>
      <textarea name="message" required></textarea>
      <button type="submit">Send</button>
    </form>
  </section>

  <!-- Floating WhatsApp -->
  <a href="https://wa.me/your-number" class="whatsapp-float">💬</a>
</body>
